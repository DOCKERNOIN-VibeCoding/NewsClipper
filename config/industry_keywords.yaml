# 산업군별 기본 검색 키워드
# 사용자가 산업군을 선택하면 해당 키워드로 기사 검색

industries:
  "F&B/식품":
    keywords:
      - "식품"
      - "음료"
      - "외식"
      - "프랜차이즈"
      - "식품안전"
      - "HMR"
      - "간편식"
    description: "식음료, 외식, 프랜차이즈 등 식품 산업 전반"

  "IT/테크":
    keywords:
      - "IT"
      - "인공지능"
      - "AI"
      - "반도체"
      - "스타트업"
      - "클라우드"
      - "SaaS"
    description: "정보기술, AI, 반도체, 소프트웨어 등"

  "뷰티/화장품":
    keywords:
      - "화장품"
      - "뷰티"
      - "스킨케어"
      - "K-뷰티"
      - "더마"
      - "올리브영"
    description: "화장품, 스킨케어, 뷰티 트렌드"

  "헬스/제약":
    keywords:
      - "제약"
      - "바이오"
      - "헬스케어"
      - "임상시험"
      - "건강기능식품"
      - "의료기기"
    description: "제약, 바이오, 의료기기, 건강기능식품"

  "유통/리테일":
    keywords:
      - "유통"
      - "이커머스"
      - "백화점"
      - "편의점"
      - "쿠팡"
      - "마트"
    description: "온·오프라인 유통, 이커머스"

  "금융/핀테크":
    keywords:
      - "금융"
      - "은행"
      - "핀테크"
      - "보험"
      - "증권"
      - "가상자산"
    description: "은행, 보험, 증권, 핀테크 서비스"

  "자동차/모빌리티":
    keywords:
      - "자동차"
      - "전기차"
      - "자율주행"
      - "모빌리티"
      - "배터리"
      - "수소차"
    description: "자동차 제조, 전기차, 모빌리티 서비스"

  "부동산/건설":
    keywords:
      - "부동산"
      - "아파트"
      - "분양"
      - "건설"
      - "재개발"
      - "전세"
    description: "부동산 시장, 건설, 분양, 정책"
